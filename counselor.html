<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WPUJAC104DWH 고객 상담과 방문 전환을 처리하는 상담원 업무 화면">
  <title>워터케어 ONE · 상담원 업무</title>
  <link rel="stylesheet" href="assets/css/fix-base.css">
  <link rel="stylesheet" href="assets/css/staff-desktop-v6.css">
</head>
<body class="v6-body v6-body--counselor">
  <a class="v6-skip-link" href="#v6-main">본문 바로가기</a>

  <header class="v6-topbar">
    <a class="v6-brand" href="index.html" aria-label="워터케어 ONE 역할 선택 홈으로 이동">
      <span class="v6-brand__mark" aria-hidden="true">W</span>
      <span><strong>워터케어 ONE</strong><small>상담원 워크스페이스</small></span>
    </a>
    <div class="v6-topbar__context" aria-label="현재 업무 컨텍스트">
      <span class="v6-live-dot"><i></i> 공유 상태 연결</span>
      <span>기준 모델 <b>WPUJAC104DWH</b></span>
      <span>FIX v6</span>
    </div>
    <div class="v6-topbar__actions">
      <button id="counselor-notification-toggle" class="v6-icon-button" type="button" aria-label="상담원 알림 열기" aria-haspopup="dialog" aria-controls="counselor-notification-panel" aria-expanded="false">
        <span aria-hidden="true">●</span><b id="counselor-notification-count" hidden>0</b>
      </button>
      <div class="v6-user-chip"><span>한</span><div><strong>한유진</strong><small>상담원 · STAFF-CONS-01</small></div></div>
    </div>
  </header>

  <div class="v6-shell">
    <aside class="v6-sidebar" aria-label="상담원 화면 메뉴">
      <div class="v6-sidebar__section">
        <p>COUNSELOR</p>
        <button class="v6-nav-item is-active" type="button" data-counselor-section="queue" aria-current="page"><span aria-hidden="true">◎</span><span>상담 큐</span><b id="counselor-queue-count">0</b></button>
        <button class="v6-nav-item" type="button" data-counselor-section="detail"><span aria-hidden="true">▤</span><span>문의 상세</span></button>
        <button class="v6-nav-item" type="button" data-counselor-section="visit"><span aria-hidden="true">□</span><span>방문 전환</span></button>
      </div>
      <div class="v6-sidebar__legend">
        <p>처리 원칙</p>
        <ul>
          <li><i class="is-danger"></i>위험·상담 필수 우선</li>
          <li><i class="is-warning"></i>고객 최종확인 대기</li>
          <li><i class="is-safe"></i>공식 근거 확인</li>
        </ul>
      </div>
      <a class="v6-home-link" href="index.html"><span aria-hidden="true">←</span> 역할 선택 홈</a>
    </aside>

    <main id="v6-main" class="v6-main" tabindex="-1">
      <div id="counselor-app" aria-live="polite" aria-busy="true">
        <div class="v6-loading"><span></span><strong>상담 업무 데이터를 불러오는 중입니다.</strong></div>
      </div>
    </main>
  </div>

  <section id="counselor-notification-panel" class="v6-notification-panel" role="dialog" aria-modal="false" aria-labelledby="counselor-notification-title" hidden>
    <header><div><small>WORK NOTIFICATIONS</small><h2 id="counselor-notification-title">상담 업무 알림</h2></div><button type="button" data-close-notifications aria-label="알림 닫기">×</button></header>
    <div id="counselor-notification-list" class="v6-notification-list"></div>
    <footer>알림을 선택하면 연결된 문의 상세를 엽니다.</footer>
  </section>

  <div id="v6-toast" class="v6-toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <noscript><div class="v6-noscript">이 업무 화면을 사용하려면 JavaScript를 활성화해 주세요.</div></noscript>

  <script src="assets/js/fix-data.js"></script>
  <script src="assets/js/fix-store.js"></script>
  <script src="assets/js/fix-common.js"></script>
  <script src="assets/js/counselor-app-v6.js"></script>
</body>
</html>
