<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f4c46">
  <meta name="description" content="워터케어 ONE 고객용 모바일 앱 프로토타입">
  <title>워터케어 ONE · 고객 앱</title>
  <link rel="stylesheet" href="assets/css/fix-base.css">
  <link rel="stylesheet" href="assets/css/customer-mobile.css">
</head>
<body class="customer-mobile-body">
  <a class="skip-link" href="#customer-main">본문 바로가기</a>

  <div class="device-stage">
    <div class="customer-app-shell">
      <header class="mobile-app-header">
        <div class="mobile-app-header__top">
          <a class="home-link" href="index.html" aria-label="역할 선택 홈으로 돌아가기">
            <span aria-hidden="true">←</span>
            <span>역할 선택</span>
          </a>
          <span class="demo-badge">시연용 합성 데이터</span>
          <button id="notification-button" class="icon-button" type="button" aria-label="알림 열기" aria-haspopup="dialog" aria-controls="notification-dialog">
            <span aria-hidden="true">●</span>
            <strong id="notification-count" hidden>0</strong>
          </button>
        </div>
        <div class="mobile-app-header__identity">
          <a class="compact-brand" href="index.html" aria-label="워터케어 ONE 역할 선택 홈">
            <span class="compact-brand__mark" aria-hidden="true">W</span>
            <span><strong>워터케어 ONE</strong><small>고객 케어</small></span>
          </a>
          <label class="profile-switcher">
            <span class="sr-only">시연 고객 선택</span>
            <select id="customer-switcher" aria-label="시연 고객 선택"></select>
          </label>
        </div>
      </header>

      <main id="customer-main" class="customer-app-main" tabindex="-1">
        <div id="customer-view" aria-live="polite" aria-busy="false"></div>
      </main>

      <nav class="mobile-bottom-nav" aria-label="고객 앱 주요 메뉴">
        <button type="button" class="is-active" data-route="home" aria-current="page">
          <span aria-hidden="true">⌂</span><small>홈</small>
        </button>
        <button type="button" data-route="product">
          <span aria-hidden="true">▣</span><small>제품</small>
        </button>
        <button type="button" class="mobile-bottom-nav__primary" data-action="start-inquiry">
          <span aria-hidden="true">＋</span><small>상담</small>
        </button>
        <button type="button" data-route="inquiries">
          <span aria-hidden="true">◎</span><small>문의</small>
        </button>
        <button type="button" data-route="schedule">
          <span aria-hidden="true">□</span><small>일정</small>
        </button>
      </nav>
    </div>
  </div>

  <dialog id="notification-dialog" class="mobile-dialog mobile-dialog--sheet" aria-labelledby="notification-title">
    <div class="mobile-dialog__header">
      <div><span class="section-kicker">NOTIFICATIONS</span><h2 id="notification-title">알림</h2></div>
      <button class="dialog-close" type="button" data-dialog-close aria-label="알림 닫기">×</button>
    </div>
    <div id="notification-list" class="notification-list" aria-live="polite"></div>
  </dialog>

  <dialog id="product-dialog" class="mobile-dialog mobile-dialog--sheet" aria-labelledby="product-dialog-title">
    <form id="product-form">
      <div class="mobile-dialog__header">
        <div><span class="section-kicker">MY PRODUCT</span><h2 id="product-dialog-title">제품 정보 수정</h2></div>
        <button class="dialog-close" type="button" data-dialog-close aria-label="제품 수정 닫기">×</button>
      </div>
      <input id="product-edit-id" name="productId" type="hidden">
      <div class="fixed-model-callout">
        <span>지원 모델</span><strong>SK매직 WPU-JAC104D</strong><code>WPUJAC104DWH</code>
      </div>
      <label class="field"><span>사용 시작일</span><input name="startedAt" type="date" required></label>
      <label class="field"><span>관리 유형</span><select name="managementType" required><option value="VISIT">방문관리</option></select></label>
      <label class="field"><span>설치 공간</span><input name="installedArea" maxlength="40" required></label>
      <div class="dialog-actions">
        <button class="button button--secondary" type="button" data-dialog-close>취소</button>
        <button class="button button--primary" type="submit">저장</button>
      </div>
    </form>
  </dialog>

  <dialog id="reschedule-dialog" class="mobile-dialog mobile-dialog--sheet" aria-labelledby="reschedule-dialog-title">
    <form id="reschedule-form">
      <div class="mobile-dialog__header">
        <div><span class="section-kicker">VISIT SCHEDULE</span><h2 id="reschedule-dialog-title">방문 일정 변경 요청</h2></div>
        <button class="dialog-close" type="button" data-dialog-close aria-label="일정 변경 닫기">×</button>
      </div>
      <input name="inquiryId" type="hidden">
      <input name="visitId" type="hidden">
      <div class="fixed-model-callout"><span>현재 확정 일정</span><strong id="current-visit-time">확인 필요</strong><small>요청이 접수되어도 담당자가 확정하기 전까지 기존 일정이 유지됩니다.</small></div>
      <label class="field"><span>희망 방문일</span><input name="preferredAt" type="datetime-local" required></label>
      <label class="field"><span>변경 사유</span><select name="reason" required><option value="">선택해주세요</option><option value="개인 일정">개인 일정</option><option value="업무 일정">업무 일정</option><option value="현장 출입 가능 시간">현장 출입 가능 시간</option><option value="기타">기타</option></select></label>
      <div class="dialog-actions">
        <button class="button button--secondary" type="button" data-dialog-close>취소</button>
        <button class="button button--primary" type="submit">변경 요청</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="assets/js/fix-data.js"></script>
  <script src="assets/js/fix-store.js"></script>
  <script src="assets/js/fix-common.js"></script>
  <script src="assets/js/customer-app-v6.js"></script>
</body>
</html>
