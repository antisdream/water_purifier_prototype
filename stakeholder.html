<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="워터케어 ONE 상담·방문·운영 통합 업무 화면">
  <title>워터케어 ONE · 관계자 업무</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="app-body staff-body">
  <a class="skip-link" href="#staff-main">본문 바로가기</a>
  <header class="staff-header">
    <a class="brand brand--light" href="index.html" aria-label="워터케어 ONE 역할 선택으로 이동">
      <span class="brand-mark" aria-hidden="true">W</span>
      <span><strong>워터케어 ONE</strong><small>Care Operations</small></span>
    </a>
    <div class="staff-header-center">
      <div id="staff-menu-search" class="global-menu-search global-menu-search--dark" data-menu-search="staff">
        <form class="global-menu-search-form" role="search" aria-label="관계자 메뉴 바로가기 검색">
          <span class="global-menu-search-icon" aria-hidden="true">⌕</span>
          <label class="sr-only" for="staff-menu-search-input">업무 메뉴 검색</label>
          <input id="staff-menu-search-input" data-menu-search-input type="search" autocomplete="off" placeholder="업무 메뉴 검색 · 예: 일정 승인" role="combobox" aria-autocomplete="list" aria-controls="staff-menu-search-results" aria-expanded="false">
          <kbd aria-hidden="true">/</kbd>
        </form>
        <div id="staff-menu-search-results" class="global-menu-search-results" data-menu-search-results role="listbox" aria-label="관계자 메뉴 검색 결과" aria-live="polite" hidden></div>
      </div>
      <div class="staff-sync-meta"><span class="system-state"><i></i>모든 시스템 정상</span><span id="last-sync">방금 동기화</span></div>
    </div>
    <div class="header-actions">
      <label class="staff-role-switcher"><span>업무 역할</span><select id="staff-role" aria-label="관계자 역할 변경"><option value="COUNSELOR">상담사 · 한유진</option><option value="ENGINEER">방문기사 · 오세훈</option><option value="OPERATOR">운영 담당자 · 장민서</option></select></label>
      <button id="staff-notification-toggle" class="icon-button staff-bell" type="button" data-notification-center="staff" data-notification-toggle aria-label="업무 알림, 읽지 않은 알림 없음" aria-haspopup="dialog" aria-controls="staff-notification-panel" aria-expanded="false"><span aria-hidden="true">●</span><b class="notification-badge" data-notification-badge hidden><span data-notification-count>0</span></b></button>
      <span class="staff-avatar" id="staff-avatar">한</span>
    </div>
  </header>

  <div class="staff-layout">
    <aside class="staff-sidebar" aria-label="관계자 업무 메뉴">
      <nav>
        <p>WORKSPACE</p>
        <button class="staff-nav-item is-active" type="button" data-staff-view="dashboard"><span aria-hidden="true">▦</span>통합 현황</button>
        <button class="staff-nav-item" type="button" data-staff-view="queue"><span aria-hidden="true">◎</span>상담 큐<b id="queue-badge">0</b></button>
        <button class="staff-nav-item" type="button" data-staff-view="visits"><span aria-hidden="true">□</span>방문 일정</button>
        <button class="staff-nav-item" type="button" data-staff-view="customers"><span aria-hidden="true">▤</span>고객·사업장</button>
        <button class="staff-nav-item" type="button" data-staff-view="analytics"><span aria-hidden="true">↗</span>운영 분석</button>
        <p>MANAGEMENT</p>
        <button class="staff-nav-item" type="button" data-staff-view="knowledge"><span aria-hidden="true">≡</span>지식·매뉴얼</button>
        <button class="staff-nav-item" type="button" data-staff-view="audit"><span aria-hidden="true">◷</span>변경 이력</button>
      </nav>
      <div class="staff-sidebar-bottom">
        <div class="workspace-card"><span>WC</span><div><strong>워터케어 운영팀</strong><small>프로토타입 워크스페이스</small></div></div>
        <a href="customer.html">고객 화면으로 전환 <span aria-hidden="true">↗</span></a>
      </div>
    </aside>

    <main id="staff-main" class="staff-main" tabindex="-1">
      <div id="staff-view" aria-live="polite"></div>
    </main>
  </div>

  <section id="staff-notification-panel" class="notification-panel notification-panel--staff" data-notification-panel role="dialog" aria-modal="false" aria-labelledby="staff-notification-title" tabindex="-1" hidden>
    <header class="notification-panel-header">
      <div><p class="eyebrow">WORK NOTIFICATIONS</p><h2 id="staff-notification-title">업무 알림</h2><p data-notification-panel-summary>새 알림이 없습니다.</p></div>
      <div class="notification-panel-actions"><button type="button" data-notification-read-all disabled>모두 읽음</button><button class="dialog-close" type="button" data-notification-close aria-label="업무 알림 창 닫기">×</button></div>
    </header>
    <ol class="notification-list" data-notification-list aria-label="관계자 업무 알림 목록"></ol>
    <footer class="notification-panel-footer">알림을 선택하면 해당 문의 또는 방문 업무 화면으로 이동합니다.</footer>
  </section>
  <span class="sr-only" data-notification-status role="status" aria-live="polite" aria-atomic="true"></span>

  <dialog id="knowledge-metadata-dialog" class="app-dialog knowledge-metadata-dialog" aria-labelledby="knowledge-metadata-title" aria-describedby="knowledge-metadata-subtitle">
    <div class="knowledge-dialog-shell">
      <header class="dialog-header knowledge-dialog-header">
        <div>
          <p class="eyebrow">KNOWLEDGE METADATA</p>
          <h2 id="knowledge-metadata-title">문서 메타데이터</h2>
          <p id="knowledge-metadata-subtitle" class="dialog-lead">선택한 문서의 연결 정보를 확인합니다.</p>
        </div>
        <button class="dialog-close" type="button" data-knowledge-dialog-close aria-label="메타데이터 창 닫기">×</button>
      </header>
      <div id="knowledge-metadata-content" class="knowledge-metadata-content"></div>
      <footer class="dialog-actions knowledge-dialog-actions">
        <button class="button button--secondary" type="button" data-knowledge-dialog-close>닫기</button>
      </footer>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/workflow-config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/stakeholder.js"></script>
</body>
</html>
